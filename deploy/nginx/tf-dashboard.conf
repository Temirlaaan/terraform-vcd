# Terraform VCD Dashboard — tf-dashboard.t-cloud.kz
#
# Place this file in the shared nginx host: ~/nginx/conf.d/tf-dashboard.conf
# then reload nginx: `docker exec nginx-proxy nginx -s reload`.
#
# Upstreams resolve via the shared `nginx-proxy_default` docker network —
# the app containers must be attached to it (see docker-compose.yml
# networks section).
#
# If nginx uses a different network name, verify with:
#   docker inspect nginx-proxy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
# and align with docker-compose.yml's `networks.nginx-proxy.name`.

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name tf-dashboard.t-cloud.kz;

    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tf-dashboard.t-cloud.kz;

    # SSL certificates (shared wildcard cert, same as other t-cloud projects)
    ssl_certificate /etc/nginx/ssl/t-cloud-2025.crt;
    ssl_certificate_key /etc/nginx/ssl/t-cloud-2025.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/t-cloud-2025.crt;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (terraform plans / HCL templates can be large)
    client_max_body_size 10m;

    # Logging
    access_log /var/log/nginx/tf-dashboard-access.log;
    error_log /var/log/nginx/tf-dashboard-error.log;

    # Backend WebSocket — terraform log stream (`/ws/terraform/{operation_id}`)
    # Keep this ABOVE `/` so WS does not leak to the Vite dev server.
    location /ws/ {
        proxy_pass http://tf_dashboard_backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-lived streams — match max terraform operation duration
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Backend HTTP API — mounted at `/api/v1/*` by FastAPI
    location /api/ {
        proxy_pass http://tf_dashboard_backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend — Vite dev server on :5174 (includes HMR websocket on `/`)
    location / {
        proxy_pass http://tf_dashboard_frontend:5173;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite HMR websocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
