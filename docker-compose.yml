services:
  postgres:
    image: postgres:15-alpine
    container_name: tf_dashboard_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-terraform_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tf_user} -d ${DB_NAME:-terraform_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tf_dashboard_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --protected-mode yes
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  minio:
    image: minio/minio:latest
    container_name: tf_dashboard_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: tf_dashboard_minio_init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - 'mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" && mc mb --ignore-existing local/terraform-state'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tf_dashboard_backend
    networks:
      - default
      - proxy-network
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tf_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-terraform_dashboard}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tf-dashboard.t-cloud.kz}
      - VERIFY_SSL=${VERIFY_SSL:-true}
      - VCD_URL=${VCD_URL}
      - VCD_API_TOKEN=${VCD_API_TOKEN}
      - VCD_API_VERSION=${VCD_API_VERSION:-38.0}
      - VCD_ORG=${VCD_ORG:-System}
      - VCD_USER=${VCD_USER}
      - VCD_PASSWORD=${VCD_PASSWORD}
      - NSXT_URL=${NSXT_URL}
      - NSXT_USER=${NSXT_USER}
      - NSXT_PASSWORD=${NSXT_PASSWORD}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - WORKSPACE_CLEANUP_ENABLED=${WORKSPACE_CLEANUP_ENABLED:-true}
      - DRIFT_SYNC_ENABLED=${DRIFT_SYNC_ENABLED:-true}
      - DRIFT_SYNC_CRON=${DRIFT_SYNC_CRON:-0 3 * * *}
      - DRIFT_SYNC_TIMEZONE=${DRIFT_SYNC_TIMEZONE:-Asia/Almaty}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./backend:/app
      - tf_workspaces:/tmp/tf-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    extra_hosts:
      - "sso-ttc.t-cloud.kz:10.121.253.148"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_AUTH_DISABLED: ${VITE_AUTH_DISABLED:-false}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-terraform-dashboard}
    container_name: tf_dashboard_frontend
    networks:
      - default
      - proxy-network
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  tf_workspaces:
  minio_data:

networks:
  default:
    driver: bridge
  proxy-network:
    external: true
    name: proxy-network
