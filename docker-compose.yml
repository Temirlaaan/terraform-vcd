version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tf_dashboard_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-terraform_dashboard}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tf_user} -d ${DB_NAME:-terraform_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tf_dashboard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tf_dashboard_minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: tf_dashboard_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/terraform-state"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tf_dashboard_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tf_user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-terraform_dashboard}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - VERIFY_SSL=${VERIFY_SSL:-true}
      - VCD_URL=${VCD_URL}
      - VCD_API_TOKEN=${VCD_API_TOKEN}
      - VCD_API_VERSION=${VCD_API_VERSION:-38.0}
      - VCD_ORG=${VCD_ORG:-System}
      - VCD_USER=${VCD_USER}
      - VCD_PASSWORD=${VCD_PASSWORD}
      - NSXT_URL=${NSXT_URL}
      - NSXT_USER=${NSXT_USER}
      - NSXT_PASSWORD=${NSXT_PASSWORD}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - WORKSPACE_CLEANUP_ENABLED=${WORKSPACE_CLEANUP_ENABLED:-true}
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./backend:/app
      - tf_workspaces:/tmp/tf-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tf_dashboard_frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_AUTH_DISABLED=${AUTH_DISABLED:-false}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  tf_workspaces:
  minio_data:
