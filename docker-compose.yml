services:
  postgres:
    image: postgres:15-alpine
    container_name: tf_dashboard_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-terraform_dashboard}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tf_user} -d ${DB_NAME:-terraform_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tf_dashboard_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tf_dashboard_minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: tf_dashboard_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/terraform-state"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tf_dashboard_backend
    networks:
      - default
      - proxy-network
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tf_user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-terraform_dashboard}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tf-dashboard.t-cloud.kz}
      - VERIFY_SSL=${VERIFY_SSL:-true}
      - VCD_URL=${VCD_URL}
      - VCD_API_TOKEN=${VCD_API_TOKEN}
      - VCD_API_VERSION=${VCD_API_VERSION:-38.0}
      - VCD_ORG=${VCD_ORG:-System}
      - VCD_USER=${VCD_USER}
      - VCD_PASSWORD=${VCD_PASSWORD}
      - NSXT_URL=${NSXT_URL}
      - NSXT_USER=${NSXT_USER}
      - NSXT_PASSWORD=${NSXT_PASSWORD}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - WORKSPACE_CLEANUP_ENABLED=${WORKSPACE_CLEANUP_ENABLED:-true}
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./backend:/app
      - tf_workspaces:/tmp/tf-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    extra_hosts:
      - "sso-ttc.t-cloud.kz:10.121.253.148"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tf_dashboard_frontend
    networks:
      - default
      - proxy-network
    volumes:
        - ./frontend:/app
        - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_AUTH_DISABLED=${VITE_AUTH_DISABLED:-${AUTH_DISABLED:-false}}
      - VITE_KEYCLOAK_URL=${VITE_KEYCLOAK_URL:-${KEYCLOAK_URL}}
      - VITE_KEYCLOAK_REALM=${VITE_KEYCLOAK_REALM:-${KEYCLOAK_REALM}}
      - VITE_KEYCLOAK_CLIENT_ID=${VITE_KEYCLOAK_CLIENT_ID:-${KEYCLOAK_CLIENT_ID:-terraform-dashboard}}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  tf_workspaces:
  minio_data:
  frontend_node_modules:  

networks:
  # Internal network for postgres/redis/minio/backend/frontend.
  default:
    driver: bridge
  # Shared network of the host-level nginx-proxy container.
  # Verify the exact name with:
  #   docker inspect nginx-proxy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
  # and set `name:` accordingly. Common defaults: nginx-proxy_default, nginx-proxy.
  proxy-network:
    external: true
    name: proxy-network
